<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Celtec Games - contact us via email, phone or our message form!">
    <meta name="author" content="Celtec Games">
    <meta name="keywords" content="Celtec, contact, get in touch, support, indie games">
    <title>Celtec - Contact Us</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header style="position: relative; padding-top: 10px; padding-bottom: 10px;">
        <img src="assets/images/celteclogo.png" alt="Celtec Games Logo" style="position: absolute; top:10px; right:10px; height: 15vw; max-height: 180px;">
        <h1 style="font-size: max(5vw, 28px);"><span style="color: #0e4380;">Cel</span><span style="color: black;">tec - Contact Us!</span></h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.htm">Home</a></li>
            <li><a href="aboutus.htm">About</a></li>
            <li><a href="products.htm">Products</a></li>
            <li><a href="blog.htm">Blog</a></li>
            <li><a href="contact.htm" class="active">Contact</a></li>
        </ul>
    </nav>
    <main style="padding: 0 5%;">
        <h1 style="font-size: max(3vw, 22px);">Contact Us</h1>
        <div class="contact-info">
            <h2 style="font-size: max(2.5vw, 20px);">Get in Touch</h2>
            <p style="font-size: max(1.5vw, 16px);"><strong>Email:</strong> celtecofficial@gmail.com</p>
            <p style="font-size: max(1.5vw, 16px);"><strong>Phone:</strong> 0800 434000</p>
        </div>
        
        <div class="contact-form">
            <h2 style="text-align: center; font-size: max(2.5vw, 20px);">Send us a Message</h2>
            <form>
                <input type="text" placeholder="Your Name" required class="form-input">
                <input type="email" placeholder="Your Email" required class="form-input">
                <input type="tel" placeholder="Your Phone Number" class="form-input">
                <textarea placeholder="Your Message" rows="5" required class="form-textarea"></textarea>
                <button type="submit" style="width: 100%; padding: 12px; margin-top: 10px;">Send Message</button>
            </form>
        </div>
    </main>
</body>
</html>
